# =============================================================================
# Full-Stack App — Continuous Integration
# =============================================================================
# Runs on pushes and PRs to main/master.
# Backend: Gradle unit tests with H2 (no Docker required).
# Frontend: typecheck, lint, vitest.
# Integration tests (Kafka, Testcontainers) require Docker — run locally only.
# =============================================================================

name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Gradle test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            backend/build.gradle
            backend/settings.gradle

      - name: Run unit tests
        run: chmod +x ./gradlew && ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

  frontend:
    name: Frontend (typecheck, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
